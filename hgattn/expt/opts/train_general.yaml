_target_: hgattn.opts.RunOpts

defaults:
  - _self_ 
  - arch: gen_small
  - attn: null
  - data@train_data: null
  - data@test_data: null
  - optim: adam
  - sched: reduce_on_plateau
  - embed: null
  - logger: streamvis
  - train: small
  - debug: d1

seed: ${random_int:}
code_tweak: none

hydra:
  run:
    dir: ${oc.env:HOME}/.hydra
  output_subdir: .hydra

