_target_: hgattn.opts.RunOpts

defaults:
  - _self_ 
  - arch: gen_size1
  - attn: rope
  - data@train_data: coff3
  - data@test_data: coff3
  - optim: adam
  - sched: reduce_on_plateau
  - embed: std
  - logger: text
  - train: small
  - debug: d1

seed: ${random_int:}
code_tweak: none

hydra:
  run:
    dir: ${oc.env:HOME}/.hydra
  output_subdir: .hydra

